
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    overflow-x:hidden;
    color:white;
    background:#081c3d;
    position:relative;
}

.wave{
    position:fixed;
    width:200%;
    height:220px;
    border-radius:45%;
    opacity:0.7;
}

.wave1{
    background:#00b4d8;
    bottom:-120px;
    left:-50%;
    animation:wave 15s linear infinite;
}

.wave2{
    background:#7209b7;
    bottom:-140px;
    left:-50%;
    animation:wave 20s linear infinite reverse;
}

.wave3{
    background:#ff006e;
    bottom:-160px;
    left:-50%;
    animation:wave 25s linear infinite;
}

@keyframes wave{
    from{
        transform:translateX(0) rotate(0deg);
    }
    to{
        transform:translateX(-25%) rotate(360deg);
    }
}

header{
    padding:20px 8%;
    position:relative;
    z-index:10;
}

.page-title{
    text-align:center;
    font-size:3rem;
    font-weight:bold;
    margin-bottom:20px;
    letter-spacing:3px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:2rem;
    font-weight:bold;
}

.nav-links{
    list-style:none;
    display:flex;
    gap:40px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-size:1.3rem;
    font-weight:bold;
}

.nav-links a:hover{
    opacity:0.8;
}

.hamburger{
    display:none;
    flex-direction:column;
    cursor:pointer;
}

.hamburger span{
    width:30px;
    height:4px;
    background:white;
    margin:4px;
}

.contact-container{
    position:relative;
    z-index:10;
    padding:50px 8%;
    display:flex;
    flex-direction:column;
    gap:35px;
}

.contact-card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(8px);
    border-radius:20px;
    padding:35px;
    text-align:center;
}

.contact-image{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:15px;
    border:4px solid white;
    margin-bottom:20px;
}

.contact-card h2{
    font-size:2.3rem;
    margin-bottom:15px;
}

.contact-card p,
.contact-card a{
    font-size:1.5rem;
    color:white;
    text-decoration:none;
    line-height:1.8;
    word-break:break-word;
}

.contact-card a:hover{
    text-decoration:underline;
}

@media(max-width:768px){

    .hamburger{
        display:flex;
    }

    .nav-links{
        position:absolute;
        top:120px;
        right:0;
        width:100%;
        background:#081c3d;
        flex-direction:column;
        align-items:center;
        padding:20px;
        display:none;
    }

    .nav-links.active{
        display:flex;
    }

    .page-title{
        font-size:2.2rem;
    }

    .contact-image{
        width:140px;
        height:140px;
    }

    .contact-card h2{
        font-size:1.8rem;
    }

    .contact-card p,
    .contact-card a{
        font-size:1.2rem;
    }
}
</style>
</head>
