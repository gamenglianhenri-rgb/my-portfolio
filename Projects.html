```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    color:white;
    background:linear-gradient(
        135deg,
        #ff0000,
        #ff7f00,
        #ffff00,
        #00ff00,
        #0000ff,
        #4b0082,
        #9400d3
    );
    background-size:400% 400%;
    animation:rainbow 15s ease infinite;
}

@keyframes rainbow{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}

header{
    padding:20px 8%;
}

.page-title{
    text-align:center;
    font-size:3rem;
    font-weight:bold;
    margin-bottom:20px;
    letter-spacing:3px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:2rem;
    font-weight:bold;
}

.nav-links{
    display:flex;
    list-style:none;
    gap:40px;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-size:1.3rem;
    font-weight:bold;
}

.nav-links a:hover{
    opacity:0.8;
}

.hamburger{
    display:none;
    flex-direction:column;
    cursor:pointer;
}

.hamburger span{
    width:30px;
    height:4px;
    background:white;
    margin:4px;
}

.projects-container{
    padding:50px 8%;
    display:flex;
    flex-direction:column;
    gap:40px;
}

.project-card{
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(8px);
    border-radius:20px;
    padding:30px;
    display:flex;
    align-items:center;
    gap:30px;
}

.project-image{
    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    border:4px solid white;
}

.project-content{
    flex:1;
}

.project-content h2{
    font-size:2.3rem;
    margin-bottom:20px;
}

.project-content a{
    color:#ffffff;
    font-size:1.4rem;
    font-weight:bold;
    word-break:break-word;
}

.project-content a:hover{
    text-decoration:underline;
}

@media(max-width:768px){

    .hamburger{
        display:flex;
    }

    .nav-links{
        position:absolute;
        top:120px;
        right:0;
        width:100%;
        background:rgba(0,0,0,0.85);
        flex-direction:column;
        align-items:center;
        padding:20px;
        display:none;
    }

    .nav-links.active{
        display:flex;
    }

    .project-card{
        flex-direction:column;
        text-align:center;
    }

    .project-image{
        width:220px;
        height:220px;
    }

    .page-title{
        font-size:2.2rem;
    }

    .project-content h2{
        font-size:1.8rem;
    }
}
</style>
</head>

<body>

<header>

<div class="page-title">MY PROJECTS</div>

<nav>

</div>
